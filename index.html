<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UrbanSlice Ultra</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI}
body{background:#111;color:#fff}

/* HEADER */
header{display:flex;justify-content:space-between;align-items:center;padding:15px 30px;background:#000}
#logo{font-size:22px;font-weight:bold;cursor:pointer}
.icons span{margin-left:20px;cursor:pointer}

/* PRODUCTS */
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:20px;padding:30px}
.card{background:#1c1c1c;border-radius:10px;overflow:hidden}
.card img{width:100%;height:160px;object-fit:cover}
.card-body{padding:10px}
button{padding:6px 10px;border:none;border-radius:5px;cursor:pointer;margin-top:5px}
.add{background:orange;color:#fff}
.wish{background:#333;color:#fff;margin-left:5px}

/* CART PANEL */
.panel{position:fixed;right:0;top:0;width:300px;height:100vh;background:#1a1a1a;padding:20px;overflow:auto;transform:translateX(100%);transition:0.3s}
.panel.active{transform:translateX(0)}
.overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);display:none}
.overlay.active{display:block}

/* ADMIN MODE */
#adminMode{display:none;height:100vh}
.admin-container{display:flex;height:100%}
.admin-sidebar{width:220px;background:#000;padding:20px}
.admin-sidebar div{margin-bottom:15px;cursor:pointer}
.admin-main{flex:1;padding:20px;overflow:auto;background:#121212}
.stat{background:#1e1e1e;padding:15px;margin-bottom:15px;border-radius:8px}
input{padding:6px;width:100%;margin:5px 0;border-radius:4px;border:none}
canvas{background:#fff;border-radius:6px}
</style>
</head>

<body>

<!-- STORE MODE -->
<div id="storeMode">

<header>
<div id="logo">UrbanSlice</div>
<div class="icons">
<span onclick="openPanel('cartPanel')">🛒</span>
<span onclick="openPanel('wishPanel')">❤️</span>
</div>
</header>

<div class="grid" id="productGrid"></div>

<div class="overlay" id="overlay" onclick="closePanels()"></div>

<div class="panel" id="cartPanel">
<h3>Cart</h3>
<div id="cartItems"></div>
<div id="cartTotal"></div>
<button onclick="checkout()">Checkout</button>
</div>

<div class="panel" id="wishPanel">
<h3>Wishlist</h3>
<div id="wishItems"></div>
</div>

</div>

<!-- ADMIN MODE -->
<div id="adminMode">
<div class="admin-container">
<div class="admin-sidebar">
<h3>Admin</h3>
<div onclick="showAdminPage('dashboard')">Dashboard</div>
<div onclick="showAdminPage('orders')">Orders</div>
<div onclick="showAdminPage('products')">Products</div>
<div onclick="showAdminPage('analytics')">Analytics</div>
<div onclick="logoutAdmin()">Logout</div>
</div>

<div class="admin-main" id="adminContent"></div>
</div>
</div>

<script>
const Store={products:[],cart:[],wishlist:[],orders:[]};

const imgs=[
"https://images.unsplash.com/photo-1601924582975-7e59f6b79f4d",
"https://images.unsplash.com/photo-1548365328-8b849e7b36a1",
"https://images.unsplash.com/photo-1594007654729-407eedc4be65",
"https://images.unsplash.com/photo-1600891964599-f61ba0e24092"
];

for(let i=1;i<=20;i++){
Store.products.push({
id:i,
name:"Pizza "+i,
price:200+i*15,
img:imgs[i%4]+"?auto=format&fit=crop&w=600&q=60"
});
}

function renderProducts(){
let grid=document.getElementById("productGrid");
grid.innerHTML="";
Store.products.forEach(p=>{
grid.innerHTML+=`
<div class="card">
<img src="${p.img}" onerror="this.src='https://via.placeholder.com/300x200'">
<div class="card-body">
<h4>${p.name}</h4>
<div>₹${p.price}</div>
<button class="add" onclick="addToCart(${p.id})">Add</button>
<button class="wish" onclick="toggleWish(${p.id})">❤</button>
</div>
</div>`;
});
}

function openPanel(id){
document.getElementById(id).classList.add("active");
document.getElementById("overlay").classList.add("active");
}
function closePanels(){
document.querySelectorAll(".panel").forEach(p=>p.classList.remove("active"));
document.getElementById("overlay").classList.remove("active");
}

function addToCart(id){
let item=Store.cart.find(i=>i.id===id);
if(item)item.qty++;
else Store.cart.push({id,qty:1});
updateCart();
}
function updateCart(){
let div=document.getElementById("cartItems");
div.innerHTML="";
let total=0;
Store.cart.forEach(c=>{
let p=Store.products.find(x=>x.id===c.id);
total+=p.price*c.qty;
div.innerHTML+=`${p.name} (${c.qty}) 
<button onclick="changeQty(${c.id},-1)">-</button>
<button onclick="changeQty(${c.id},1)">+</button><br>`;
});
document.getElementById("cartTotal").innerText="Total: ₹"+total;
}
function changeQty(id,val){
let item=Store.cart.find(i=>i.id===id);
item.qty+=val;
if(item.qty<=0)Store.cart=Store.cart.filter(i=>i.id!==id);
updateCart();
}

function toggleWish(id){
if(Store.wishlist.includes(id))
Store.wishlist=Store.wishlist.filter(i=>i!==id);
else Store.wishlist.push(id);
renderWish();
}
function renderWish(){
let div=document.getElementById("wishItems");
div.innerHTML="";
Store.wishlist.forEach(id=>{
let p=Store.products.find(x=>x.id===id);
div.innerHTML+=p.name+"<br>";
});
}

function checkout(){
if(Store.cart.length===0)return;
let total=0;
Store.cart.forEach(c=>{
let p=Store.products.find(x=>x.id===c.id);
total+=p.price*c.qty;
});
Store.orders.push({total,date:new Date().toLocaleString()});
Store.cart=[];
updateCart();
alert("Order Placed!");
}

/* ADMIN */
let taps=0;
document.getElementById("logo").onclick=()=>{
taps++;
if(taps===5){
let pass=prompt("Enter Admin Password");
if(pass==="shivansh@123"){
document.getElementById("storeMode").style.display="none";
document.getElementById("adminMode").style.display="block";
showAdminPage("dashboard");
}
else alert("Wrong Password");
taps=0;
}
};

function showAdminPage(page){
let content=document.getElementById("adminContent");
if(page==="dashboard"){
let revenue=Store.orders.reduce((a,b)=>a+b.total,0);
content.innerHTML=`
<div class="stat">Total Orders: ${Store.orders.length}</div>
<div class="stat">Total Revenue: ₹${revenue}</div>
<div class="stat">Total Products: ${Store.products.length}</div>`;
}
if(page==="orders"){
content.innerHTML="<h3>Orders</h3>";
Store.orders.forEach((o,i)=>{
content.innerHTML+=`
<div class="stat">
Order ${i+1} - ₹${o.total} - ${o.date}
<button onclick="deleteOrder(${i})">Delete</button>
</div>`;
});
}
if(page==="products"){
content.innerHTML="<h3>Products</h3>";
Store.products.forEach((p,i)=>{
content.innerHTML+=`
<div class="stat">
${p.name} - ₹${p.price}
<button onclick="changePrice(${i},10)">+</button>
<button onclick="changePrice(${i},-10)">-</button>
<button onclick="removeProduct(${i})">Remove</button>
</div>`;
});
content.innerHTML+=`
<h4>Add Product</h4>
<input id="pName" placeholder="Name">
<input id="pPrice" placeholder="Price">
<button onclick="addProduct()">Add</button>`;
}
if(page==="analytics"){
content.innerHTML="<h3>Revenue Chart</h3><canvas id='chart' width='400' height='200'></canvas>";
drawChart();
}
}

function deleteOrder(i){Store.orders.splice(i,1);showAdminPage("orders")}
function changePrice(i,val){Store.products[i].price+=val;showAdminPage("products");renderProducts()}
function removeProduct(i){Store.products.splice(i,1);showAdminPage("products");renderProducts()}
function addProduct(){
let name=document.getElementById("pName").value;
let price=parseInt(document.getElementById("pPrice").value);
if(!name||!price)return;
Store.products.push({id:Date.now(),name,price,img:imgs[0]});
showAdminPage("products");
renderProducts();
}
function drawChart(){
let canvas=document.getElementById("chart");
let ctx=canvas.getContext("2d");
ctx.clearRect(0,0,400,200);
Store.orders.slice(-7).forEach((o,i)=>{
ctx.fillStyle="orange";
ctx.fillRect(i*50,200-o.total/5,30,o.total/5);
});
}
function logoutAdmin(){
document.getElementById("adminMode").style.display="none";
document.getElementById("storeMode").style.display="block";
}

renderProducts();
updateCart();
renderWish();
</script>

</body>
</html>
