<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UrbanSlice | School Project</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: #0c0c0c; color: #fff; }
        header { padding: 20px 50px; display: flex; justify-content: space-between; background: rgba(255,255,255,0.05); }
        .logo { font-weight: 800; color: #ff7a00; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; padding: 50px; }
        .card { background: #1c1c1c; padding: 20px; border-radius: 15px; text-align: center; }
        .btn { padding: 10px 20px; border: none; border-radius: 20px; background: #ff7a00; color: white; cursor: pointer; }
        .panel { position: fixed; right: 0; top: 0; width: 300px; height: 100vh; background: #111; padding: 20px; display: none; }
        .panel.active { display: block; }
    </style>
</head>
<body>

<header>
    <div class="logo">URBANSLICE</div>
    <div onclick="toggleCart()" style="cursor:pointer">🛒 <span id="count">0</span></div>
</header>

<section class="grid" id="productGrid"></section>

<div class="panel" id="cartPanel">
    <h2>Your Cart</h2>
    <div id="cartItems"></div>
    <h3 id="total"></h3>
    <button class="btn" onclick="checkout()">Checkout</button>
</div>

<script>
    const products = [
        {name:"Margherita Pizza", price:399, category:"Pizza"},
        {name:"Pepperoni Pizza", price:599, category:"Pizza"},
        {name:"Chicken Burger", price:349, category:"Burger"},
        {name:"Veggie Burger", price:299, category:"Burger"},
        {name:"Coca Cola", price:79, category:"Drink"},
        {name:"Sprite", price:69, category:"Drink"}
    ];

    let cart = [];

    function renderProducts() {
        let grid = document.getElementById("productGrid");
        products.forEach((p, i) => {
            grid.innerHTML += `
                <div class="card">
                    <h3>${p.name}</h3>
                    <p>₹${p.price}</p>
                    <button class="btn" onclick="addToCart(${i})">Add to Cart</button>
                </div>
            `;
        });
    }

    function addToCart(i) {
        cart.push(products[i]);
        updateCart();
    }

    function updateCart() {
        let items = document.getElementById("cartItems");
        let totalDisplay = document.getElementById("total");
        items.innerHTML = "";
        let total = 0;
        cart.forEach(c => {
            items.innerHTML += `<p>${c.name} - ₹${c.price}</p>`;
            total += c.price;
        });
        totalDisplay.innerText = "Total: ₹" + total;
        document.getElementById("count").innerText = cart.length;
    }

    function toggleCart() {
        document.getElementById("cartPanel").classList.toggle("active");
    }

    function checkout() {
        alert("Order placed successfully!");
        cart = [];
        updateCart();
        toggleCart();
    }

    renderProducts();
</script>
</body>
</html>
